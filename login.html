<!DOCTYPE html>
<html>
<head>
<title>BookNest Login</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.login-box{
width:350px;
padding:40px;
background:#111c44;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
text-align:center;
color:white;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(-20px);}
to{opacity:1;}
}

.login-box h2{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#1f2a60;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2563eb;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="login-box">

<h2>📚 BookNest</h2>

<form action="home.html">

<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
